<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" fill="none">
  <title>ClawHunt — primary logo (dark theme)</title>
  <defs>
    <linearGradient id="cpg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- mark -->
  <g transform="translate(16,16) scale(0.7)" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
    <path d="M24 88 C24 54, 54 30, 80 40 L96 32 L92 50 C104 60, 108 78, 96 92 L104 108 L86 100 C62 112, 30 106, 24 88 Z" stroke="url(#cpg)"/>
    <path d="M48 72 L72 60" stroke="#7C3AED"/>
    <circle cx="88" cy="64" r="6" fill="#00D4FF"/>
  </g>
  <!-- wordmark -->
  <text x="128" y="62" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="40" letter-spacing="-0.02em" fill="#FFFFFF">CLAWHUNT</text>
  <text x="129" y="90" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" letter-spacing="0.24em" fill="#00D4FF">AI BOUNTY MARKETPLACE</text>
</svg>
