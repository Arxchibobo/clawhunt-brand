<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawHunt — {{SUBJECT}}</title>
<!--
  ClawHunt email master template v1.0
  Usage: copy, replace {{TOKENS}}, keep inline styles (email client friendly).
  Fonts gracefully fall back to system-ui if Google Fonts blocked.
-->
</head>
<body style="margin:0; padding:0; background:#0D0D24; font-family:'Inter', system-ui, -apple-system, sans-serif; color:#E2E8F0;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0D0D24;">
    <tr><td align="center" style="padding:32px 16px;">

      <!-- container -->
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px; background:#0A1628; border-radius:20px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.5);">

        <!-- header: logo + mono tag -->
        <tr>
          <td style="padding:24px 32px 8px 32px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="left" style="font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; font-size:22px; letter-spacing:-0.01em; color:#FFFFFF;">
                  <span style="color:#00D4FF;">◆</span> CLAWHUNT
                </td>
                <td align="right" style="font-family:'JetBrains Mono', ui-monospace, monospace; font-size:11px; color:#00D4FF; letter-spacing:0.08em;">
                  SYSTEM ONLINE
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- gradient divider -->
        <tr><td style="padding:8px 32px;">
          <div style="height:2px; background:linear-gradient(135deg, #00D4FF 0%, #7C3AED 100%); border-radius:2px;"></div>
        </td></tr>

        <!-- hero title -->
        <tr>
          <td style="padding:24px 32px 8px 32px;">
            <div style="font-family:'JetBrains Mono', ui-monospace, monospace; font-size:11px; color:#00D4FF; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px;">
              &gt; {{EYEBROW}}
            </div>
            <h1 style="margin:0; font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; font-size:32px; line-height:40px; letter-spacing:-0.02em; color:#FFFFFF;">
              {{HEADLINE}}
            </h1>
          </td>
        </tr>

        <!-- body -->
        <tr>
          <td style="padding:16px 32px 8px 32px; font-family:'Inter', system-ui, sans-serif; font-size:16px; line-height:26px; color:#CBD5E1;">
            {{BODY_HTML}}
          </td>
        </tr>

        <!-- CTA -->
        <tr>
          <td align="center" style="padding:24px 32px;">
            <a href="{{CTA_URL}}" style="display:inline-block; text-decoration:none; background:linear-gradient(135deg, #00D4FF 0%, #7C3AED 100%); color:#FFFFFF; font-family:'Space Grotesk', system-ui, sans-serif; font-weight:600; font-size:15px; padding:14px 28px; border-radius:12px; box-shadow:0 0 20px rgba(0,212,255,0.3);">
              {{CTA_LABEL}} →
            </a>
          </td>
        </tr>

        <!-- meta strip -->
        <tr>
          <td style="padding:16px 32px 24px 32px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.2); border-radius:12px;">
              <tr>
                <td style="padding:14px 18px; font-family:'JetBrains Mono', ui-monospace, monospace; font-size:12px; color:#94A3B8; letter-spacing:0.04em;">
                  {{META_MONO}}
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- footer -->
        <tr>
          <td style="padding:24px 32px 32px 32px; border-top:1px solid rgba(255,255,255,0.08); text-align:center;">
            <div style="font-family:'Inter', system-ui, sans-serif; font-size:13px; color:#64748B; margin-bottom:8px;">
              <a href="https://clawhunt.store" style="color:#00D4FF; text-decoration:none;">clawhunt.store</a> ·
              <a href="{{X_URL}}" style="color:#00D4FF; text-decoration:none;">X / Twitter</a> ·
              <a href="{{DISCORD_URL}}" style="color:#00D4FF; text-decoration:none;">Discord</a>
            </div>
            <div style="font-family:'JetBrains Mono', ui-monospace, monospace; font-size:10px; color:#475569; letter-spacing:0.08em;">
              AUTONOMOUS · VERIFIED · ON-CHAIN
            </div>
            <div style="font-family:'Inter', system-ui, sans-serif; font-size:11px; color:#475569; margin-top:12px;">
              © 2026 ClawHunt · <a href="{{UNSUB_URL}}" style="color:#64748B;">Unsubscribe</a>
            </div>
          </td>
        </tr>

      </table>
      <!-- /container -->

    </td></tr>
  </table>
</body>
</html>
